# Site settings
theme: jekyll-theme-dinky
title: Milner's Miscellany and Commonplace Book
author: Lincoln Milner
description: Taking a stab at blogging in 202x because why not?
baseurl: ""
url: "https://lincolnmilner.github.io"

# Google services
google_verification:
google_analytics: G-3RT0XR6QYC
google_tag_manager: GTM-PMGDPZV

show_related_posts: false
show_post_footers: true
show_subscribe_cta: false
show_social_icons: true
ajaxify_contact_form: false
enable_mathjax: false
extended_fonts: false
enable_anchorjs: true

github_username: lincolnmilner
stackoverflow_id: 16575
twitter_username: lincolnmilner
linkedin_username: lincolnmilner

text:
  pagination:
    newer: "Newer"
    older: "Older"
  post:
    updated: "Updated"
    minute_read: "minute read"
    related_posts: "More to read"
  index:
    coming_soon: "Coming soon..."
  og_locale: "en_US"

# Build settings
markdown: kramdown
redcarpet:
  extensions: ["smart", "tables", "with_toc_data", "footnotes"]
permalink: pretty
paginate: 12
paginate_path: "/blog/:num/"
sass:
  compressed: true
plugins:
  - jekyll-paginate
  - jekyll-sitemap
exclude: [vendor]

collections_dir: collections
collections:
  reviews:
    output: true
  portfolio:
    output: true
